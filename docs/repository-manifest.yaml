project:
  name: LIA
  applications:
    backend:
      location: backend
      language: TypeScript
      runtime: Node.js
      framework: Fastify
      orm: Prisma
      database: PostgreSQL
      source: backend/src
      schema: backend/prisma/schema.prisma
      dependencies:
        runtime:
          - fastify ^5.10.0
          - "@fastify/cors ^11.3.0"
          - "@fastify/jwt ^10.2.0"
          - "@prisma/client ^7.8.0"
          - "@prisma/adapter-pg ^7.8.0"
          - argon2 ^0.44.0
          - dotenv ^17.4.2
          - pg ^8.22.0
        dev:
          - typescript ^7.0.2
          - prisma ^7.8.0
          - tsx ^4.23.0
          - eslint ^10.7.0
          - prettier ^3.9.5
    frontend:
      location: frontend
      language: TypeScript
      framework: React
      build-tool: Vite
      styling: Tailwind CSS
      source: frontend/src
      alias: "@/*" → "frontend/src/*"
      dependencies:
        runtime:
          - react ^19.2.7
          - react-dom ^19.2.7
          - "@tanstack/react-query ^5.101.2"
          - react-hook-form ^7.81.0
          - "@hookform/resolvers ^5.4.0"
          - zod ^4.4.3
          - axios ^1.18.1
          - shadcn ^4.13.0
          - sonner ^2.0.7
          - tailwindcss ^4.3.2
          - "@tailwindcss/vite ^4.3.2"
          - "@base-ui/react ^1.6.0"
          - class-variance-authority ^0.7.1
          - clsx ^2.1.1
          - tailwind-merge ^3.6.0
          - "@hugeicons/react ^1.1.9"
          - next-themes ^0.4.6
          - tw-animate-css ^1.4.0
          - "@fontsource-variable/figtree ^5.2.10"
        dev:
          - typescript ~6.0.2
          - vite ^8.1.1
          - "@vitejs/plugin-react ^6.0.3"
          - eslint ^10.6.0
          - eslint-plugin-react-hooks ^7.1.1
          - eslint-plugin-react-refresh ^0.5.3
  absent-from-repository:
    - mobile application
    - Docker configuration
    - testing framework (vitest, jest — decisão pendente)
    - routing library (react-router-dom — decisão pendente)
    - Prettier no frontend
documentation:
  root: docs
  engineering: docs/engineering
  decisions: docs/decisions
  knowledge: docs/knowledge
  epics: docs/epics
  stories: docs/stories
  sprints: docs/sprints
  agents: docs/agents
